<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
</head>

<body>
    <H1>Equipamentos do Backend</H1>
    <div id="filtros">
        <p>Filtros de pesquisa</p>
        <input type="text" id="nome" placeholder="Nome" value="" />
        <select id="status">
            <option value=""> - Status - </option>
            <option value="emprestado">Emprestado</option>
            <option value="disponivel">Disponível</option>
            <option value="manutencao">Em Manutenção</option>
        </select>
        <select id="tipo">
            <option value=""> - Tipo - </option>
            <option value="notebook">Notebook</option>
            <option value="projetor">Projetor</option>
            <option value="desktop">Desktop</option>
            <option value="tablet">Tablet</option>
            <option value="monitor">Monitor</option>
        </select>
        <button id="filtrar" onclick="getEquipamentos()">Filtrar</button>
    </div>

    <div id="cadastro">

        <h2>Cadastrar / Editar</h2>

        <form id="form-cadastro" onsubmit="salvarEquipamento(event)">
            <input type="hidden" id="equipamento-id">

            <input type="text" id="cadastro-nome" placeholder="Nome do Equipamento" required>

            <select id="cadastro-tipo">
                <option value=""> - Selecione o Tipo - </option>
                <option value="notebook">Notebook</option>
                <option value="projetor">Projetor</option>
                <option value="desktop">Desktop</option>
                <option value="tablet">Tablet</option>
                <option value="monitor">Monitor</option>
            </select>

            <select id="cadastro-status">
                <option value=""> - Selecione o Status - </option>
                <option value="emprestado">Emprestado</option>
                <option value="disponivel">Disponível</option>
                <option value="manutencao">Em Manutenção</option>
            </select>

            <input type="text" id="cadastro-descricao" placeholder="Descrição (Opcional)" />

            <button type="submit" id="btn-salvar">Salvar</button>
            <button type="button" id="btn-cancelar" onclick="limparFormulario()" style="display: none; background-color: #555;">Cancelar</button>
        </form>
    </div>
    <div id="equipamentos">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="data"></tbody>
        </table>
    </div>
    <script src='main.js'></script>
</body>

</html>
